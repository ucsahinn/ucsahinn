<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" role="img" aria-labelledby="title desc">
  <title id="title">Codex Skill Forge repository card</title>
  <desc id="desc">Premium GitHub profile card for the Codex Skill Forge public repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.54" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="16%" r="72%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.42"/>
      <stop offset="0.46" stop-color="#0f766e" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect x="14" y="14" width="872" height="242" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="15.5" y="15.5" width="869" height="239" rx="26.5" fill="url(#glow)" stroke="#34d399" stroke-opacity="0.34"/>
  <path d="M646 72h116M646 108h156M646 144h124M646 180h92" fill="none" stroke="#99f6e4" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  <path d="M72 210 C150 160 230 212 304 166 C390 112 472 172 560 124" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" opacity="0.24"/>
  <g transform="translate(56 54)">
    <rect width="70" height="70" rx="18" fill="#0f766e"/>
    <path d="M22 24h26l-8 12 8 12H22V24Z" fill="none" stroke="#f8fafc" stroke-width="6" stroke-linejoin="round"/>
    <path d="M52 24v42M23 60h28" fill="none" stroke="#f8fafc" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text x="150" y="82" fill="#fff7ed" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800">Codex Skill Forge</text>
  <text x="150" y="120" fill="#bbf7d0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Skill and plugin generator</text>
  <text x="150" y="153" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Creates lean SKILL.md files, references, validation scripts and plugin packaging.</text>
  <g transform="translate(150 184)" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">

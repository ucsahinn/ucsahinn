    <text x="18" y="21" fill="#f8fafc">SKILLS</text>
    <rect x="106" width="114" height="32" rx="16" fill="#111827" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="124" y="21" fill="#bbf7d0">PLUGINS</text>
    <rect x="232" width="124" height="32" rx="16" fill="#f59e0b"/>
    <text x="250" y="21" fill="#111827">VALIDATED</text>
  </g>
  <text x="612" y="222" fill="#bbf7d0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">ucsahinn/codex-skill-forge</text>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" role="img" aria-labelledby="title desc">
  <title id="title">Codex CLI Operator Handbook repository card</title>
  <desc id="desc">Premium GitHub profile card for the Codex CLI Operator Handbook public repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="18%" r="74%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect x="14" y="14" width="872" height="242" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="15.5" y="15.5" width="869" height="239" rx="26.5" fill="url(#glow)" stroke="#60a5fa" stroke-opacity="0.34"/>
  <path d="M628 70l54 38-54 38M778 70l-54 38 54 38M638 180h148" fill="none" stroke="#93c5fd" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>
  <path d="M70 204h216M70 174h138M70 144h260" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" opacity="0.22"/>

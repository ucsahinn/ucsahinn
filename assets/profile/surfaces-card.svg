<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" role="img" aria-labelledby="title desc">
  <title id="title">Live surfaces card</title>
  <desc id="desc">Premium GitHub profile card for live product and documentation surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.54" stop-color="#111827"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="18%" r="72%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.32"/>
      <stop offset="0.38" stop-color="#0f766e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect x="14" y="14" width="872" height="242" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="15.5" y="15.5" width="869" height="239" rx="26.5" fill="url(#glow)" stroke="#2dd4bf" stroke-opacity="0.32"/>
  <g transform="translate(56 54)">
    <rect width="70" height="70" rx="18" fill="#111827" stroke="#2dd4bf" stroke-opacity="0.52"/>
    <circle cx="35" cy="35" r="22" fill="none" stroke="#f59e0b" stroke-width="6"/>
    <path d="M13 35h44M35 13c10 11 10 33 0 44M35 13c-10 11-10 33 0 44" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="150" y="82" fill="#fff7ed" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">Live Surfaces</text>
  <text x="150" y="120" fill="#99f6e4" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Product, docs and publishing endpoints</text>
  <text x="150" y="153" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">myvuln.io, MyVuln Docs, PassMan releases and SiberDergi live publication surface.</text>
  <g transform="translate(150 184)" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect width="108" height="32" rx="16" fill="#0f766e"/>
    <text x="18" y="21" fill="#f8fafc">MYVULN</text>
    <rect x="120" width="84" height="32" rx="16" fill="#0891b2"/>
    <text x="139" y="21" fill="#f8fafc">DOCS</text>
    <rect x="216" width="122" height="32" rx="16" fill="#f59e0b"/>
    <text x="234" y="21" fill="#111827">SIBERDERGI</text>
  </g>
  <text x="640" y="222" fill="#99f6e4" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">live product links</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" role="img" aria-labelledby="title desc">
  <title id="title">MyVuln repository card</title>
  <desc id="desc">Premium GitHub profile card for the MyVuln public repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.56" stop-color="#0b1624"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="18%" r="72%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#0f766e" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect x="14" y="14" width="872" height="242" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="15.5" y="15.5" width="869" height="239" rx="26.5" fill="url(#glow)" stroke="#2dd4bf" stroke-opacity="0.34"/>
  <path d="M52 216 C150 176 232 244 335 198 S515 164 622 204 760 198 844 146" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-opacity="0.24"/>
  <g transform="translate(56 54)">
    <rect width="70" height="70" rx="18" fill="#0f766e"/>
    <path d="M21 36l10 10 20-25" fill="none" stroke="#f8fafc" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="150" y="82" fill="#fff7ed" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">MyVuln</text>
  <text x="150" y="120" fill="#bfdbfe" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Threat intelligence public hub</text>
  <text x="150" y="153" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">CVE tracking, URL intelligence, API docs and operator-facing product surface.</text>
  <g transform="translate(150 184)" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect width="104" height="32" rx="16" fill="#0f766e"/>
    <text x="18" y="21" fill="#f8fafc">PUBLIC</text>
    <rect x="116" width="108" height="32" rx="16" fill="#111827" stroke="#2dd4bf" stroke-opacity="0.42"/>
    <text x="135" y="21" fill="#bfdbfe">MYVULN.IO</text>
    <rect x="236" width="88" height="32" rx="16" fill="#f59e0b"/>
    <text x="254" y="21" fill="#111827">DOCS</text>
  </g>
  <text x="706" y="222" fill="#99f6e4" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">ucsahinn/myvuln</text>

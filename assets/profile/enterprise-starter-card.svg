<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" role="img" aria-labelledby="title desc">
  <title id="title">Codex Enterprise Starter repository card</title>
  <desc id="desc">Premium GitHub profile card for the Codex Enterprise Starter repository.</desc>
  <defs>
